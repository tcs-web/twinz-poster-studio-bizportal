<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TWINS STUDIO PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#0B0D14; --panel:#11141C; --border:#1E2433; 
  --primary:#6366F1; --accent:#22D3EE; --magenta:#d90479; --navy:#001f4d;
  --text:#E5E7EB; --muted:#9CA3AF; --danger:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter', system-ui}
body{background:var(--bg);color:var(--text);overflow-x:hidden}

.header{background:linear-gradient(90deg,#6366F1,#22D3EE);padding:12px 16px;text-align:center;font-size:14px;font-weight:900;letter-spacing:-0.3px}
.header span{opacity:0.8;font-weight:600}

.toolbar{
  display:flex;flex-wrap:wrap;gap:6px;padding:12px 8px;
  background:var(--panel);border-bottom:1px solid var(--border);
  overflow-x:auto; -webkit-overflow-scrolling: touch;
}
.btn{
  padding:10px 12px;background:#1A1F2E;border:1px solid var(--border);
  color:var(--text);font-weight:600;border-radius:8px;cursor:pointer;
  font-size:12px;white-space:nowrap;flex-shrink:0;transition:all 0.2s
}
.btn:active{background:#232A3D}
.btn.primary{background:var(--primary);border-color:var(--primary)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#000}
.btn.danger{background:var(--danger);border-color:var(--danger)}

.colors{display:flex;gap:8px;padding:12px;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--border)}
.color{width:36px;height:36px;border-radius:8px;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
.color.active{border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(34,211,238,0.3)}

.main{display:flex;flex-direction:column}
.layers{
  width:100%;background:var(--panel);padding:10px;border-bottom:1px solid var(--border);
  max-height:120px;overflow-x:auto;overflow-y:hidden;display:flex;gap:6px
}
.layers h3{color:var(--muted);font-size:10px;text-transform:uppercase;min-width:60px}
.layer-item{
  background:#1A1F2E;padding:8px 10px;border-radius:6px;font-size:11px;
  cursor:pointer;border:1px solid var(--border);white-space:nowrap;min-width:100px
}
.layer-item.active{background:rgba(99,102,241,0.3);border-color:var(--primary)}

.canvas-wrap{flex:1;display:flex;justify-content:center;align-items:center;padding:12px;background:#0A0C11}
#canvas{background:#fff;border-radius:4px;max-width:100%;height:auto}

.templates{padding:16px;background:var(--panel)}
.templates h3{color:var(--muted);font-size:12px;margin-bottom:10px;text-transform:uppercase}
.template-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.template-btn{
  padding:14px;background:#1A1F2E;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-weight:600;cursor:pointer;font-size:12px
}
.template-btn:active{border-color:var(--primary)}

.fps{position:fixed;bottom:10px;right:10px;background:#000;padding:4px 8px;border-radius:4px;font-size:10px;color:var(--accent)}

@media(min-width:768px){
 .main{flex-direction:row;height:calc(100vh - 280px)}
 .layers{width:240px;flex-direction:column;max-height:none;border-right:1px solid var(--border);border-bottom:none}
 .template-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<div class="header">TWINS<span>STUDIO</span> PRO <span>• CORPORATE EDITION</span></div>

<div class="toolbar">
  <button class="btn" onclick="undo()">↶ Undo</button>
  <button class="btn" onclick="redo()">↷ Redo</button>
  <button class="btn" onclick="addText()">T Text</button>
  <button class="btn" onclick="uploadImage()">Image</button>
  <button class="btn" onclick="addLogo()">Logo</button>
  <button class="btn" onclick="addQR()">QR</button>
  <button class="btn accent" onclick="aiBackground()">AI BG</button>
  <button class="btn" onclick="addShape('triangle')">▲ Triangle</button>
  <button class="btn" onclick="addShape('rect')">▭ Rectangle</button>
  <button class="btn" onclick="addPhotoSection()">Photo</button>
  <button class="btn" onclick="addAboutSection()">About</button>
  <button class="btn" onclick="addServicesSection()">Services</button>
  <button class="btn" onclick="add100()">100x</button>
  <button class="btn primary" onclick="exportPNG()">4K PNG</button>
  <button class="btn" onclick="exportPDF()">PDF</button>
  <button class="btn danger" onclick="clearCanvas()">Clear</button>
</div>

<div class="colors">
  <div class="color active" style="background:#6366F1" onclick="setBrand('#6366F1', this)"></div>
  <div class="color" style="background:#22D3EE" onclick="setBrand('#22D3EE', this)"></div>
  <div class="color" style="background:#d90479" onclick="setBrand('#d90479', this)"></div>
  <div class="color" style="background:#001f4d" onclick="setBrand('#001f4d', this)"></div>
  <div class="color" style="background:#10B981" onclick="setBrand('#10B981', this)"></div>
  <div class="color" style="background:#F59E0B" onclick="setBrand('#F59E0B', this)"></div>
  <div class="color" style="background:#EF4444" onclick="setBrand('#EF4444', this)"></div>
  <div class="color" style="background:#111827" onclick="setBrand('#111827', this)"></div>
  <div class="color" style="background:#FFFFFF" onclick="setBrand('#FFFFFF', this)"></div>
</div>

<div class="main">
  <div class="layers">
    <h3>LAYERS</h3>
    <div id="layerList"></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div class="templates">
  <h3>Professional Templates</h3>
  <div class="template-grid">
    <button class="template-btn" onclick="loadCorporateTemplate()">Corporate Pro</button>
    <button class="template-btn" onclick="loadRealEstateTemplate()">Real Estate</button>
    <button class="template-btn" onclick="loadMegaSaleTemplate()">Mega Sale 70%</button>
    <button class="template-btn" onclick="loadEventTemplate()">Event</button>
  </div>
</div>

<div class="fps" id="fps">FPS: 60</div>
<input type="file" id="imgInput" style="display:none" accept="image/*" onchange="addImage(event)">

<script>
// === MOBILE RESPONSIVE CANVAS ===
const canvasEl = document.getElementById('canvas');
const canvasWidth = Math.min(window.innerWidth - 24, 1080);
const canvasHeight = canvasWidth * 1.25; // 4:5 ratio for Instagram
canvasEl.width = 1080;
canvasEl.height = 1350;

fabric.Object.prototype.objectCaching = true;
fabric.perfLimitSizeInPx = 4096;

const canvas = new fabric.Canvas('canvas', {
  width: 1080, height: 1350,
  backgroundColor: '#0B0D14',
  renderOnAddRemove: false,
  enableRetinaScaling: true
});

let history = [], historyIndex = -1, saveTimeout;
let brandColor = '#6366F1';
let lastRender = 0, frameCount = 0;

// === 60FPS + DEBOUNCED HISTORY ===
function queueSave(){ clearTimeout(saveTimeout); saveTimeout = setTimeout(saveState, 500); }
function saveState(){ history = history.slice(0, historyIndex + 1); history.push(canvas.toDatalessJSON()); historyIndex++; updateLayers(); }
function undo(){ if(historyIndex > 0){ historyIndex--; canvas.loadFromJSON(history[historyIndex], ()=>{canvas.requestRenderAll(); updateLayers();}); }}
function redo(){ if(historyIndex < history.length - 1){ historyIndex++; canvas.loadFromJSON(history[historyIndex], ()=>{canvas.requestRenderAll(); updateLayers();}); }}

function renderLoop(timestamp){
  frameCount++;
  if(timestamp - lastRender > 1000){ document.getElementById('fps').innerText = 'FPS: ' + frameCount; frameCount = 0; lastRender = timestamp; }
  canvas.requestRenderAll();
  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

canvas.on('object:added', ()=>{queueSave();});
canvas.on('object:removed', ()=>{queueSave();});
canvas.on('object:modified', ()=>{queueSave();});

function setBrand(color, el) {
  brandColor = color;
  document.querySelectorAll('.color').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function updateLayers() {
  const list = document.getElementById('layerList');
  list.innerHTML = '';
  canvas.getObjects().forEach((obj, i)=>{
    const name = obj.type === 'textbox'? obj.text.substring(0,15) : obj.type;
    list.innerHTML += `<div class="layer-item ${i===canvas.getActiveObject()? 'active':''}" onclick="canvas.setActiveObject(canvas.getObjects()[${i}])">${i+1}. ${name}</div>`;
  });
}

function addText(){
  canvas.add(new fabric.Textbox('Your Headline', {
    left:540,top:200,fontSize:72,fill:'#FFFFFF',width:900,fontFamily:'Inter',fontWeight:900,originX:'center',textAlign:'center'
  }));
}

function addShape(type) {
  if(type === 'rect') canvas.add(new fabric.Rect({left:340,top:500,width:400,height:200,fill:brandColor,rx:12}));
  if(type === 'triangle') canvas.add(new fabric.Triangle({left:400,top:500,width:280,height:280,fill:brandColor}));
}

function add100(){
  for(let i=0; i<100; i++){
    canvas.add(new fabric.Rect({
      left: Math.random()*900, top: Math.random()*1200,
      width: 30, height: 30, fill: `hsl(${Math.random()*360},70%,50%)`
    }));
  }
}

function addPhotoSection() {
  const group = new fabric.Group([
    new fabric.Rect({width:400,height:500,fill:'#1E2433',rx:12}),
    new fabric.Text('Upload Photo', {top:200,fontSize:24,fill:'#9CA3AF',originX:'center'})
  ], {left:80,top:400});
  canvas.add(group);
}

function addAboutSection() {
  canvas.add(new fabric.Text('ABOUT', {left:600,top:450,fontSize:48,fill:'#FFFFFF',fontWeight:900,fontFamily:'Inter'}));
  canvas.add(new fabric.Textbox('Professional company description goes here.', {left:600,top:510,fontSize:18,fill:'#9CA3AF',width:400,fontFamily:'Inter'}));
}

function addServicesSection() {
  canvas.add(new fabric.Text('SERVICES', {left:600,top:650,fontSize:36,fill:brandColor,fontWeight:700,fontFamily:'Inter'}));
  ['Strategy','Design','Development','Marketing'].forEach((s,i)=>{
    canvas.add(new fabric.Text('✓ ' + s, {left:600,top:710+i*35,fontSize:20,fill:'#E5E7EB',fontFamily:'Inter'}));
  });
}

function aiBackground() {
  const gradient = new fabric.Gradient({
    type: 'linear',
    coords: {x1:0,y1:0,x2:1080,y2:1350},
    colorStops: [{offset:0,color:brandColor},{offset:1,color:'#0B0D14'}]
  });
  canvas.backgroundColor = gradient;
  canvas.requestRenderAll();
  saveState();
}

function addLogo(){
  const logo = new fabric.Group([
    new fabric.Rect({width:80,height:80,fill:brandColor,rx:12}),
    new fabric.Text('T', {fontSize:40,fill:'#fff',originX:'center',originY:'center',fontFamily:'Inter',fontWeight:900})
  ], {left:60,top:60});
  canvas.add(logo);
}

function addQR(){
  const qrDiv = document.createElement('div');
  new QRCode(qrDiv, {text: "https://twinstudio.pro", width: 120, height: 120});
  setTimeout(()=>{
    fabric.Image.fromURL(qrDiv.querySelector('img').src, img=>{
      img.set({left:900,top:1200});
      canvas.add(img);
    });
  },100);
}

function uploadImage(){ document.getElementById('imgInput').click(); }
function addImage(e){
  const file = e.target.files[0];
  fabric.Image.fromURL(URL.createObjectURL(file), img=>{
    img.set({left:540,top:600,scaleX:0.4,scaleY:0.4,originX:'center'});
    canvas.add(img);
  });
}

function loadCorporateTemplate() {
  canvas.clear();
  canvas.backgroundColor = '#0B0D14';
  canvas.add(new fabric.Rect({left:0,top:0,width:1080,height:300,fill:brandColor}));
  addText();
  addPhotoSection();
  addAboutSection();
  addServicesSection();
  saveState();
}

function loadRealEstateTemplate() {
  canvas.clear(); canvas.backgroundColor = '#0B0D14';
  canvas.add(new fabric.Text('LUXURY PROPERTY', {left:540,top:300,fontSize:64,fill:'#fff',originX:'center',fontWeight:900,fontFamily:'Inter'}));
  saveState();
}

function loadMegaSaleTemplate() {
  canvas.clear(); canvas.backgroundColor = '#EF4444';
  canvas.add(new fabric.Text('MEGA SALE', {left:540,top:300,fontSize:100,fill:'#fff',originX:'center',fontWeight:900,fontFamily:'Inter'}));
  saveState();
}

function loadEventTemplate() {
  canvas.clear(); canvas.backgroundColor = '#1E2433';
  canvas.add(new fabric.Text('CORPORATE EVENT', {left:540,top:400,fontSize:70,fill:'#22D3EE',originX:'center',fontWeight:900,fontFamily:'Inter'}));
  saveState();
}

function exportPNG(){
  const a = document.createElement('a');
  a.href = canvas.toDataURL({format:'png', multiplier:4});
  a.download = 'TwinsStudio_4K.png'; a.click();
}

function exportPDF(){
  const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
  pdf.save('TwinsStudio.pdf');
}

function clearCanvas(){ canvas.clear(); canvas.backgroundColor = '#0B0D14'; saveState(); }

// Mobile touch fix
canvas.on('mouse:down', function(options) {
  if (options.target) {
    canvas.setActiveObject(options.target);
  }
});

loadCorporateTemplate();
saveState();
</script>
</body>
</html>
