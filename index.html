<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITAN V3 - 60FPS Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<style>
:root{--bg:#050508; --panel:#0F1117; --accent:#00D26A; --border:#1F2937}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter', system-ui}
body{display:flex;height:100vh;background:var(--bg);color:#E5E7EB;overflow:hidden}
.toolbar{width:64px;background:var(--panel);border-right:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:8px;align-items:center}
.tool-btn{width:48px;height:48px;background:#1F2937;border:none;border-radius:10px;color:var(--accent);font-size:18px;cursor:pointer}
.tool-btn.active{background:var(--accent);color:#000}
#canvas-wrap{flex:1;position:relative;background:#1a1a1a}
#canvas{background:#fff}
.sidebar{width:280px;background:var(--panel);border-left:1px solid var(--border)}
.topbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;background:var(--panel);padding:8px;border-radius:12px;border:1px solid var(--border)}
.topbar button{padding:8px 16px;background:#1F2937;border:1px solid var(--border);border-radius:8px;color:#fff;font-weight:600;cursor:pointer}
.topbar button.primary{background:var(--accent);color:#000;border:none}
.fps{position:absolute;bottom:10px;right:10px;background:#000;padding:6px 12px;border-radius:6px;font-size:12px;color:var(--accent)}
</style>
</head>
<body>

<div class="toolbar">
  <button class="tool-btn active" onclick="setTool('select')">↖</button>
  <button class="tool-btn" onclick="setTool('text')">T</button>
  <button class="tool-btn" onclick="setTool('rect')">▭</button>
  <button class="tool-btn" onclick="add100()">100x</button>
  <button class="tool-btn" onclick="document.getElementById('imgInput').click()">🖼</button>
  <input type="file" id="imgInput" style="display:none" onchange="addImage(event)">
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="topbar">
    <button onclick="undo()">↶ Undo</button>
    <button onclick="redo()">↷ Redo</button>
    <button class="primary" onclick="exportPNG()">Export 4K</button>
  </div>
  <div class="fps" id="fps">FPS: 60</div>
</div>

<div class="sidebar">
  <div style="padding:16px">
    <h3 style="font-size:12px;color:#9CA3AF;margin-bottom:12px">PERFORMANCE</h3>
    <div>Objects: <span id="objCount">0</span></div>
  </div>
</div>

<script>
// === GOD TIER PERFORMANCE SETTINGS ===
fabric.Object.prototype.objectCaching = true; // Cache to bitmap
fabric.Object.prototype.statefullCache = true;
fabric.perfLimitSizeInPx = 4096; // Allow 4K

const canvas = new fabric.Canvas('canvas', {
  width: window.innerWidth - 344,
  height: window.innerHeight,
  backgroundColor: '#ffffff',
  renderOnAddRemove: false, // Manual render
  enableRetinaScaling: false, // Disable for speed on big canvas
  imageSmoothingEnabled: true
});

let history = [], historyIndex = -1, saveTimeout;
let lastRender = 0, frameCount = 0;

// === DEBOUNCED HISTORY ===
function queueSave(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveState, 500); // Only save 500ms after you stop
}
function saveState(){
  history = history.slice(0, historyIndex + 1);
  history.push(canvas.toDatalessJSON(['globalCompositeOperation'])); // dataless = smaller
  historyIndex++;
}
function undo(){ if(historyIndex > 0){ historyIndex--; canvas.loadFromJSON(history[historyIndex], ()=>{canvas.requestRenderAll(); updateUI();}); }}
function redo(){ if(historyIndex < history.length - 1){ historyIndex++; canvas.loadFromJSON(history[historyIndex], ()=>{canvas.requestRenderAll(); updateUI();}); }}

// === OPTIMIZED EVENTS ===
canvas.on('object:added', ()=>{queueSave(); updateUI();});
canvas.on('object:removed', ()=>{queueSave(); updateUI();});
canvas.on('object:modified', ()=>{queueSave();}); // Don't update layers on every move

// === MANUAL RENDER LOOP 60FPS ===
function renderLoop(timestamp){
  frameCount++;
  if(timestamp - lastRender > 1000){
    document.getElementById('fps').innerText = 'FPS: ' + frameCount;
    frameCount = 0; lastRender = timestamp;
  }
  canvas.requestRenderAll();
  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

// === TOOLS ===
function setTool(tool){
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function addText(){
  const text = new fabric.Textbox('Edit Me', {
    left: 200, top: 200, fontSize: 48, fill: '#111', width: 400
  });
  text.set({dirty: true});
  canvas.add(text);
}

function addRect(){
  const rect = new fabric.Rect({
    left: Math.random()*500, top: Math.random()*500, width: 200, height: 120,
    fill: '#00D26A', rx: 12, ry: 12
  });
  rect.set({dirty: true});
  canvas.add(rect);
}

// STRESS TEST: Add 100 objects to prove it's fast
function add100(){
  for(let i=0; i<100; i++){
    canvas.add(new fabric.Rect({
      left: Math.random()*800, top: Math.random()*600,
      width: 50, height: 50, fill: `hsl(${Math.random()*360},70%,50%)`
    }));
  }
  canvas.requestRenderAll();
}

function addImage(e){
  const file = e.target.files[0];
  fabric.Image.fromURL(URL.createObjectURL(file), img=>{
    img.set({scaleX: 0.5, scaleY: 0.5, objectCaching: true});
    canvas.add(img);
    canvas.requestRenderAll();
  });
}

function updateUI(){
  document.getElementById('objCount').innerText = canvas.getObjects().length;
}

function exportPNG(){
  // Use lower quality during work, 4x only on export
  const dataURL = canvas.toDataURL({format:'png', multiplier:4});
  const a = document.createElement('a');
  a.href = dataURL; a.download = 'TITAN_4K.png'; a.click();
}

saveState();
updateUI();
</script>
</body>
</html>
