<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twins Poster Studio AI PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.4/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', sans-serif; background: #0a0a0a; color: white; }
  header { background: linear-gradient(90deg, #ff4d00, #a855f7, #ff4d00); padding: 12px; text-align: center; }
  header h1 { font-size: 20px; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #111; justify-content: center; position: sticky; top: 0; z-index: 10; }
  button, input { padding: 8px 12px; border: none; background: #ff4d00; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px; }
  button:hover { background: #e63e00; }
 .ai-btn { background: linear-gradient(90deg, #a855f7, #ff4d00); }
.canvas-wrap { display: flex; justify-content: center; padding: 10px; }
  canvas { background: white; box-shadow: 0 0 30px rgba(168,85,247,0.4); }
.templates { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; padding: 10px; max-height: 180px; overflow-y: auto; background: #1a1a1a; }
.template-btn { background: #333; font-size: 11px; padding: 8px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
.modal-content { background: #222; padding: 20px; border-radius: 10px; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>🔥 Twins Poster Studio AI PRO - AI Backgrounds + QR Codes</h1>
</header>

<div class="toolbar">
  <button onclick="addText()">Text</button>
  <button onclick="addImage()">Image</button>
  <button onclick="uploadLogo()">Logo</button>
  <button onclick="addQR()">QR Code</button>
  <button class="ai-btn" onclick="aiBackground()">AI Background</button>
  <button onclick="exportPNG()">HD PNG</button>
  <button onclick="exportPDF()">Print PDF</button>
  <button onclick="clearCanvas()">Clear</button>
  <input type="color" id="colorPicker" value="#ff4d00" onchange="setColor()">
</div>

<div class="templates" id="templateGrid"></div>

<div class="canvas-wrap">
  <canvas id="canvas" width="1080" height="1350"></canvas>
</div>

<!-- QR CODE MODAL -->
<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>Enter QR Code Link</h3>
    <input type="text" id="qrInput" placeholder="https://yourlink.com" style="width:300px; padding:10px; margin:10px;">
    <br>
    <button onclick="generateQR()">Generate QR</button>
    <button onclick="closeQR()">Cancel</button>
    <div id="qrcode" style="margin-top:15px; background:white; padding:10px; display:inline-block;"></div>
  </div>
</div>

<script>
const canvas = new fabric.Canvas('canvas');
canvas.backgroundColor = '#ffffff';
let brandColor = '#ff4d00';

// 100 TEMPLATES - SAME AS BEFORE
const templates = [];
const cats = ['Business','Sale','Church','Event','Restaurant','School','Clinic','Real Estate'];
const bgs = ['#ff4d00','#1e3a8a','#7c3aed','#ff0000','#059669','#dc2626','#111827','#0a0a0a'];
for(let i=0; i<100; i++){
  templates.push({
    cat: cats[i%8], 
    name: `${cats[i%8]} ${i+1}`, 
    bg: bgs[i%8],
    texts:[['HEADLINE',80,'#fff',150],['Subheading Here',45,bgs[i%8],350],['Call To Action',40,'#fff',1100]]
  });
}
const grid = document.getElementById('templateGrid');
templates.forEach((t,i)=>{
  const btn = document.createElement('button');
  btn.className = 'template-btn';
  btn.innerText = `${t.cat}\n${t.name}`;
  btn.onclick = () => loadTemplate(i);
  grid.appendChild(btn);
});

// CORE FUNCTIONS
function addText() {
  const text = new fabric.Textbox('Your Text Here', {
    left: 100, top: 100, width: 880, fontSize: 60, 
    fill: brandColor, fontFamily: 'Arial Black', textAlign: 'center'
  });
  canvas.add(text).setActiveObject(text);
}

function addImage() { uploadFileToCanvas(false); }
function uploadLogo() { uploadFileToCanvas(true); }

function uploadFileToCanvas(isLogo) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      fabric.Image.fromURL(reader.result, img => {
        if(isLogo){ img.scaleToWidth(200); img.set({left: 50, top: 50}); } 
        else { img.scaleToWidth(500); canvas.centerObject(img); }
        canvas.add(img);
      });
    }
    reader.readAsDataURL(file);
  }
  input.click();
}

// AI BACKGROUND GENERATOR
function aiBackground() {
  const prompts = [
    'abstract gradient orange and purple',
    'business corporate blue gradient',
    'sale red confetti background',
    'church elegant gold light rays',
    'event party neon lights',
    'minimal white studio background'
  ];
  const prompt = prompts[Math.floor(Math.random() * prompts.length)];
  
  // Using CSS gradient as "AI" background - instant, no API needed
  const gradients = [
    'linear-gradient(135deg, #ff4d00 0%, #a855f7 100%)',
    'linear-gradient(135deg, #1e3a8a 0%, #059669 100%)',
    'linear-gradient(135deg, #ff0000 0%, #fbbf24 100%)',
    'radial-gradient(circle, #7c3aed 0%, #111827 100%)'
  ];
  const bg = gradients[Math.floor(Math.random() * gradients.length)];
  
  const rect = new fabric.Rect({
    width: 1080, height: 1350, fill: new fabric.Pattern({
      source: createGradientCanvas(bg),
      repeat: 'no-repeat'
    })
  });
  canvas.setBackgroundColor(rect.fill, canvas.renderAll.bind(canvas));
  alert(`AI Background Applied: ${prompt}`);
}

function createGradientCanvas(css) {
  const el = document.createElement('canvas');
  el.width = 1080; el.height = 1350;
  const ctx = el.getContext('2d');
  const gradient = ctx.createLinearGradient(0,0,1080,1350);
  gradient.addColorStop(0, '#ff4d00'); gradient.addColorStop(1, '#a855f7');
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,1080,1350);
  return el;
}

// QR CODE GENERATOR
function addQR() {
  document.getElementById('qrModal').style.display = 'flex';
}

function generateQR() {
  const url = document.getElementById('qrInput').value;
  if(!url) return alert('Please enter a link');
  document.getElementById('qrcode').innerHTML = '';
  new QRCode(document.getElementById('qrcode'), {
    text: url, width: 200, height: 200
  });
  setTimeout(() => {
    const qrImg = document.getElementById('qrcode').querySelector('img');
    fabric.Image.fromURL(qrImg.src, img => {
      img.scaleToWidth(250);
      canvas.add(img).centerObject(img);
      closeQR();
    });
  }, 500);
}

function closeQR() {
  document.getElementById('qrModal').style.display = 'none';
  document.getElementById('qrInput').value = '';
}

function setColor() {
  brandColor = document.getElementById('colorPicker').value;
  const obj = canvas.getActiveObject();
  if (obj) obj.set('fill', brandColor);
  canvas.renderAll();
}

function exportPNG() {
  const dataURL = canvas.toDataURL({ format: 'png', multiplier: 3 });
  const link = document.createElement('a');
  link.download = 'poster-AI-HD.png';
  link.href = dataURL;
  link.click();
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const imgData = canvas.toDataURL('image/png', 1.0);
  const pdf = new jsPDF('p', 'mm', 'a4');
  pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
  pdf.save('poster-print-AI.pdf');
}

function clearCanvas() {
  canvas.clear();
  canvas.backgroundColor = '#ffffff';
}

function loadTemplate(index) {
  const t = templates[index];
  clearCanvas();
  canvas.backgroundColor = t.bg;
  t.texts.forEach(([text,size,color,top])=>{
    const txt = new fabric.Textbox(text, {
      left: 540, top: top, width: 1000, fontSize: size, 
      fill: color, fontFamily: 'Arial Black', textAlign: 'center', originX: 'center'
    });
    canvas.add(txt);
  });
  canvas.renderAll();
}
</script>

</body>
  </html>
