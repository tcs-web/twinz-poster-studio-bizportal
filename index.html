<!DOCTYPE html>
<html lang="en">

<title>Twins Poster Studio AI PRO - GOD TIER CANVAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  body { font-family: 'Arial Black', Arial; background: #0a0a0a; color: white; margin:0; }
  header { background: linear-gradient(90deg, #ff4d00, #a855f7, #00d4ff); padding: 12px; text-align: center; font-size: 16px; font-weight: bold; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #111; justify-content: center; position: sticky; top:0; z-index:50; }
  button { padding: 10px 14px; border: none; background: #ff4d00; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 12px; }
.ai-btn { background: linear-gradient(90deg, #a855f7, #00d4ff); }
.templates-section { background: #1a1a1a; padding: 15px; }
.templates-title { text-align: center; font-size: 16px; margin-bottom: 12px; color: #00d4ff; font-weight: bold; }
.templates-wrapper { max-height: 300px; overflow-y: auto; }
.templates { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.template-btn { background: #2a2a2a; border: 2px solid #00d4ff; padding: 14px 8px; text-align: center; border-radius: 8px; color: white; font-weight: bold; font-size: 13px; width: 100%; }
.template-btn:active { background: #00d4ff; color: #000; }
.canvas-wrap { display: flex; justify-content: center; padding: 15px; }
  canvas { background: white; max-width: 100%; border: 3px solid #00d4ff; }
</style>
</head>
<body>

<header>🔥 TWINS POSTER STUDIO AI PRO - GOD TIER CANVAS</header>

<div class="toolbar">
  <button onclick="exportPNG()">HD PNG</button>
  <button onclick="exportPDF()">Print PDF</button>
  <button onclick="clearCanvas()">Clear</button>
</div>

<div class="canvas-wrap">
  <canvas id="canvas" width="1080" height="1350"></canvas>
</div>

<div class="templates-section">
  <div class="templates-title">📋 20 GOD TIER TEMPLATES - TAP TO LOAD</div>
  <div class="templates-wrapper">
    <div class="templates">
      <button class="template-btn" onclick="loadTemplate(0)">Corporate Pro</button>
      <button class="template-btn" onclick="loadTemplate(1)">Real Estate</button>
      <button class="template-btn" onclick="loadTemplate(2)">Mega Sale 70%</button>
      <button class="template-btn" onclick="loadTemplate(3)">Black Friday</button>
      <button class="template-btn" onclick="loadTemplate(4)">Sunday Service</button>
      <button class="template-btn" onclick="loadTemplate(5)">Easter Special</button>
      <button class="template-btn" onclick="loadTemplate(6)">Grand Opening</button>
      <button class="template-btn" onclick="loadTemplate(7)">Live Concert</button>
      <button class="template-btn" onclick="loadTemplate(8)">Food Special</button>
      <button class="template-btn" onclick="loadTemplate(9)">Menu Board</button>
      <button class="template-btn" onclick="loadTemplate(10)">School Enroll</button>
      <button class="template-btn" onclick="loadTemplate(11)">Health Check</button>
      <button class="template-btn" onclick="loadTemplate(12)">Wedding Invite</button>
      <button class="template-btn" onclick="loadTemplate(13)">Birthday Party</button>
      <button class="template-btn" onclick="loadTemplate(14)">We Are Hiring</button>
      <button class="template-btn" onclick="loadTemplate(15)">Fitness Promo</button>
      <button class="template-btn" onclick="loadTemplate(16)">Car Wash</button>
      <button class="template-btn" onclick="loadTemplate(17)">Hair Special</button>
      <button class="template-btn" onclick="loadTemplate(18)">Spaza Special</button>
      <button class="template-btn" onclick="loadTemplate(19)">Memorial</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const templates = [
  {bg:'#0a0a0a', t1:['YOUR BUSINESS',90,'#ff4d00',200], t2:['Professional Services',50,'#fff',350], t3:['Call: 012 345 6789',45,'#fff',1100]},
  {bg:'#1e3a8a', t1:['FOR SALE',110,'#fff',180], t2:['3 Bedroom House',55,'#fbbf24',320], t3:['Contact Agent',45,'#fff',500]},
  {bg:'#ff0000', t1:['MEGA SALE!',130,'#ffff00',150], t2:['UP TO 70% OFF',75,'#fff',300], t3:['This Weekend',50,'#fff',450]},
  {bg:'#000', t1:['BLACK FRIDAY',110,'#ff4d00',180], t2:['BIGGEST DEALS',60,'#fff',320], t3:['Don\'t Miss!',50,'#fff',450]},
  {bg:'#1e3a8a', t1:['SUNDAY SERVICE',80,'#fff',200], t2:['10:00 AM',50,'#fbbf24',340], t3:['All Welcome',45,'#fff',480]},
  {bg:'#7c3aed', t1:['HE IS RISEN',100,'#fff',200], t2:['Easter Service',55,'#fbbf24',340], t3:['Join Us',45,'#fff',480]},
  {bg:'#ff9500', t1:['GRAND OPENING',90,'#fff',200], t2:['You Are Invited',55,'#000',340], t3:['Free Gifts',45,'#fff',480]},
  {bg:'#7c3aed', t1:['LIVE CONCERT',100,'#fff',180], t2:['Top Artists',50,'#fbbf24',320], t3:['Get Tickets',45,'#fff',460]},
  {bg:'#dc2626', t1:['TODAY SPECIAL',90,'#fff',200], t2:['Burger + Chips',55,'#fbbf24',340], t3:['Only R99',65,'#fff',480]},
  {bg:'#111827', t1:['OUR MENU',100,'#ff4d00',180], t2:['Pizza | Pasta',50,'#fff',320], t3:['Order Now',45,'#fff',460]},
  {bg:'#059669', t1:['2026 ENROLLMENT',90,'#fff',200], t2:['Now Open',65,'#fbbf24',340], t3:['Visit Us',45,'#fff',480]},
  {bg:'#2563eb', t1:['FREE HEALTH CHECK',80,'#fff',200], t2:['BP + Sugar Test',50,'#fbbf24',340], t3:['This Saturday',45,'#fff',480]},
  {bg:'#fbbf24', t1:['YOU ARE INVITED',80,'#000',200], t2:['John & Sarah',55,'#7c3aed',340], t3:['12 Dec 2026',45,'#000',480]},
  {bg:'#ec4899', t1:['BIRTHDAY PARTY',90,'#fff',200], t2:['You\'re Invited!',55,'#fbbf24',340], t3:['Let\'s Celebrate',45,'#fff',480]},
  {bg:'#0a0a0a', t1:['WE ARE HIRING',100,'#ff4d00',200], t2:['Sales Assistant',50,'#fff',340], t3:['Apply Today',45,'#fff',480]},
  {bg:'#111827', t1:['JOIN THE GYM',100,'#ff4d00',200], t2:['First Month Free',55,'#fff',340], t3:['Get Fit',45,'#fff',480]},
  {bg:'#2563eb', t1:['CAR WASH',90,'#fff',200], t2:['Full Wash',55,'#fbbf24',340], t3:['Only R80',65,'#fff',480]},
  {bg:'#ec4899', t1:['HAIR SPECIAL',100,'#fff',200], t2:['Cut + Wash',55,'#fbbf24',340], t3:['Book Now',45,'#fff',480]},
  {bg:'#ff9500', t1:['SPAZA SPECIALS',90,'#000',200], t2:['Bread R15',50,'#000',340], t3:['Open 24hrs',45,'#000',480]},
  {bg:'#111827', t1:['IN LOVING MEMORY',80,'#fff',200], t2:['Celebration of Life',55,'#fbbf24',340], t3:['All Welcome',45,'#fff',480]},
];

function drawText(text, size, color, y) {
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px Arial Black`;
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText(text, 540, y);
  ctx.shadowBlur = 0;
}

function loadTemplate(i) {
  const t = templates[i];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  drawText(t.t1[0], t.t1[1], t.t1[2], t.t1[3]);
  drawText(t.t2[0], t.t2[1], t.t2[2], t.t2[3]);
  drawText(t.t3[0], t.t3[1], t.t3[2], t.t3[3]);
  
  document.querySelector('.canvas-wrap').scrollIntoView({behavior: 'smooth'});
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function exportPNG() {
  const link = document.createElement('a');
  link.download = 'GOD-TIER-poster.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function exportPDF() {
  const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
  pdf.save('GOD-TIER-poster.pdf');
}

// AUTO LOAD FIRST TEMPLATE
loadTemplate(0);
</script>

</body>
</html>
