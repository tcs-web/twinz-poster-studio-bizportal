<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twins Poster Studio AI PRO - FIXED</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.4/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: Arial; background: #0a0a0a; color: white; margin:0; }
  header { background: linear-gradient(90deg, #ff4d00, #a855f7); padding: 12px; text-align: center; font-size: 16px; font-weight: bold; }
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; background: #111; justify-content: center; position: sticky; top:0; }
  button { padding: 10px 14px; border: none; background: #ff4d00; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
.ai-btn { background: linear-gradient(90deg, #a855f7, #ff4d00); }
.templates-section { background: #1a1a1a; padding: 15px; }
.templates-title { text-align: center; font-size: 16px; margin-bottom: 12px; color: #ff4d00; font-weight: bold; }
.templates { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.template-btn { background: #2a2a2a; border: 2px solid #ff4d00; padding: 12px; text-align: center; border-radius: 8px; color: white; font-weight: bold; width: 100%; }
.template-btn:active { background: #ff4d00; }
.template-btn small { display: block; font-size: 10px; color: #aaa; font-weight: normal; }
.canvas-wrap { display: flex; justify-content: center; padding: 15px; }
  canvas { background: white; max-width: 100%; border: 3px solid #ff4d00; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
.modal-content { background: #222; padding: 20px; border-radius: 10px; text-align: center; }
</style>
</head>
<body>

<header>🔥 Twins Poster Studio AI PRO - TEMPLATES FIXED</header>

<div class="toolbar">
  <button onclick="addText()">Text</button>
  <button onclick="addImage()">Image</button>
  <button onclick="uploadLogo()">Logo</button>
  <button onclick="addQR()">QR Code</button>
  <button class="ai-btn" onclick="aiBackground()">AI Background</button>
  <button onclick="exportPNG()">HD PNG</button>
  <button onclick="exportPDF()">Print PDF</button>
  <button onclick="clearCanvas()">Clear</button>
</div>

<div class="templates-section">
  <div class="templates-title">📋 CHOOSE A TEMPLATE DESIGN - TAP ANY</div>
  <div class="templates">
    <button class="template-btn" onclick="loadTemplate(0)">Corporate Pro<small>Business</small></button>
    <button class="template-btn" onclick="loadTemplate(1)">Real Estate<small>Business</small></button>
    <button class="template-btn" onclick="loadTemplate(2)">Mega Sale 70%<small>Sale</small></button>
    <button class="template-btn" onclick="loadTemplate(3)">Black Friday<small>Sale</small></button>
    <button class="template-btn" onclick="loadTemplate(4)">Sunday Service<small>Church</small></button>
    <button class="template-btn" onclick="loadTemplate(5)">Easter Special<small>Church</small></button>
    <button class="template-btn" onclick="loadTemplate(6)">Grand Opening<small>Event</small></button>
    <button class="template-btn" onclick="loadTemplate(7)">Live Concert<small>Event</small></button>
    <button class="template-btn" onclick="loadTemplate(8)">Food Special<small>Restaurant</small></button>
    <button class="template-btn" onclick="loadTemplate(9)">Menu Board<small>Restaurant</small></button>
    <button class="template-btn" onclick="loadTemplate(10)">School Enrollment<small>School</small></button>
    <button class="template-btn" onclick="loadTemplate(11)">Health Check<small>Clinic</small></button>
    <button class="template-btn" onclick="loadTemplate(12)">Wedding Invite<small>Wedding</small></button>
    <button class="template-btn" onclick="loadTemplate(13)">Birthday Party<small>Birthday</small></button>
    <button class="template-btn" onclick="loadTemplate(14)">We Are Hiring<small>Job</small></button>
    <button class="template-btn" onclick="loadTemplate(15)">Fitness Promo<small>Gym</small></button>
    <button class="template-btn" onclick="loadTemplate(16)">Car Wash<small>Car Wash</small></button>
    <button class="template-btn" onclick="loadTemplate(17)">Hair Special<small>Salon</small></button>
    <button class="template-btn" onclick="loadTemplate(18)">Spaza Special<small>Shop</small></button>
    <button class="template-btn" onclick="loadTemplate(19)">Memorial<small>Funeral</small></button>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas" width="1080" height="1350"></canvas>
</div>

<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>Enter QR Code Link</h3>
    <input type="text" id="qrInput" placeholder="https://yourlink.com" style="width:90%; padding:10px; margin:10px;">
    <br>
    <button onclick="generateQR()">Generate QR</button>
    <button onclick="closeQR()">Cancel</button>
    <div id="qrcode" style="margin-top:15px; background:white; padding:10px; display:inline-block;"></div>
  </div>
</div>

<script>
const canvas = new fabric.Canvas('canvas');
canvas.backgroundColor = '#ffffff';

const templates = [
  {bg:'#0a0a0a', t1:['YOUR BUSINESS',90,'#ff4d00',200], t2:['Professional Services',45,'#fff',350], t3:['Call: 012 345 6789',40,'#fff',1100]},
  {bg:'#1e3a8a', t1:['FOR SALE',100,'#fff',180], t2:['3 Bedroom House',50,'#fbbf24',320], t3:['Contact Agent',40,'#fff',500]},
  {bg:'#ff0000', t1:['MEGA SALE!',120,'#ffff00',150], t2:['UP TO 70% OFF',70,'#fff',300], t3:['This Weekend',45,'#fff',450]},
  {bg:'#000', t1:['BLACK FRIDAY',100,'#ff4d00',180], t2:['BIGGEST DEALS',55,'#fff',320], t3:['Don\'t Miss!',45,'#fff',450]},
  {bg:'#1e3a8a', t1:['SUNDAY SERVICE',70,'#fff',200], t2:['10:00 AM',45,'#fbbf24',340], t3:['All Welcome',40,'#fff',480]},
  {bg:'#7c3aed', t1:['HE IS RISEN',90,'#fff',200], t2:['Easter Service',50,'#fbbf24',340], t3:['Join Us',40,'#fff',480]},
  {bg:'#ff9500', t1:['GRAND OPENING',80,'#fff',200], t2:['You Are Invited',50,'#000',340], t3:['Free Gifts',40,'#fff',480]},
  {bg:'#7c3aed', t1:['LIVE CONCERT',90,'#fff',180], t2:['Top Artists',45,'#fbbf24',320], t3:['Get Tickets',40,'#fff',460]},
  {bg:'#dc2626', t1:['TODAY SPECIAL',80,'#fff',200], t2:['Burger + Chips',50,'#fbbf24',340], t3:['Only R99',60,'#fff',480]},
  {bg:'#111827', t1:['OUR MENU',90,'#ff4d00',180], t2:['Pizza | Pasta',45,'#fff',320], t3:['Order Now',40,'#fff',460]},
  {bg:'#059669', t1:['2026 ENROLLMENT',80,'#fff',200], t2:['Now Open',60,'#fbbf24',340], t3:['Visit Us',40,'#fff',480]},
  {bg:'#2563eb', t1:['FREE HEALTH CHECK',70,'#fff',200], t2:['BP + Sugar Test',45,'#fbbf24',340], t3:['This Saturday',40,'#fff',480]},
  {bg:'#fbbf24', t1:['YOU ARE INVITED',70,'#000',200], t2:['John & Sarah',50,'#7c3aed',340], t3:['12 Dec 2026',40,'#000',480]},
  {bg:'#ec4899', t1:['BIRTHDAY PARTY',80,'#fff',200], t2:['You\'re Invited!',50,'#fbbf24',340], t3:['Let\'s Celebrate',40,'#fff',480]},
  {bg:'#0a0a0a', t1:['WE ARE HIRING',90,'#ff4d00',200], t2:['Sales Assistant',45,'#fff',340], t3:['Apply Today',40,'#fff',480]},
  {bg:'#111827', t1:['JOIN THE GYM',90,'#ff4d00',200], t2:['First Month Free',50,'#fff',340], t3:['Get Fit',40,'#fff',480]},
  {bg:'#2563eb', t1:['CAR WASH',80,'#fff',200], t2:['Full Wash',50,'#fbbf24',340], t3:['Only R80',60,'#fff',480]},
  {bg:'#ec4899', t1:['HAIR SPECIAL',90,'#fff',200], t2:['Cut + Wash',50,'#fbbf24',340], t3:['Book Now',40,'#fff',480]},
  {bg:'#ff9500', t1:['SPAZA SPECIALS',80,'#000',200], t2:['Bread R15',45,'#000',340], t3:['Open 24hrs',40,'#000',480]},
  {bg:'#111827', t1:['IN LOVING MEMORY',70,'#fff',200], t2:['Celebration of Life',50,'#fbbf24',340], t3:['All Welcome',40,'#fff',480]},
];

function addText() { canvas.add(new fabric.Textbox('Your Text Here', {left: 100, top: 100, width: 880, fontSize: 60, fill: '#ff4d00', fontFamily: 'Arial Black', textAlign: 'center'})); }
function addImage() { uploadFile(false); }
function uploadLogo() { uploadFile(true); }

function uploadFile(isLogo) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = () => {
      fabric.Image.fromURL(reader.result, img => {
        if(isLogo){ img.scaleToWidth(200); img.set({left: 50, top: 50}); } 
        else { img.scaleToWidth(500); canvas.centerObject(img); }
        canvas.add(img);
      });
    }
    reader.readAsDataURL(e.target.files[0]);
  }
  input.click();
}

function aiBackground() {
  const colors = ['#ff4d00','#a855f7','#1e3a8a','#059669','#ff0000'];
  canvas.setBackgroundColor(colors[Math.floor(Math.random()*5)], canvas.requestRenderAll.bind(canvas));
}

function addQR() { document.getElementById('qrModal').style.display = 'flex'; }
function generateQR() {
  const url = document.getElementById('qrInput').value;
  if(!url) return alert('Enter link');
  document.getElementById('qrcode').innerHTML = '';
  new QRCode(document.getElementById('qrcode'), {text: url, width: 200, height: 200});
  setTimeout(() => {
    fabric.Image.fromURL(document.getElementById('qrcode').querySelector('img').src, img => {
      img.scaleToWidth(250); canvas.add(img).centerObject(img); closeQR();
    });
  }, 500);
}
function closeQR() { document.getElementById('qrModal').style.display = 'none'; }

function exportPNG() {
  const link = document.createElement('a');
  link.download = 'poster-HD.png';
  link.href = canvas.toDataURL({format: 'png', multiplier: 3});
  link.click();
}
function exportPDF() {
  const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
  pdf.save('poster.pdf');
}
function clearCanvas() { canvas.clear(); canvas.backgroundColor = '#ffffff'; }

// FIXED FUNCTION - THIS IS THE KEY
function loadTemplate(i) {
  const t = templates[i];
  canvas.clear();
  canvas.setBackgroundColor(t.bg, function() {
    canvas.add(new fabric.Textbox(t.t1[0], {left:540, top:t.t1[3], width:1000, fontSize:t.t1[1], fill:t.t1[2], fontFamily:'Arial Black', textAlign:'center', originX:'center'}));
    canvas.add(new fabric.Textbox(t.t2[0], {left:540, top:t.t2[3], width:1000, fontSize:t.t2[1], fill:t.t2[2], fontFamily:'Arial Black', textAlign:'center', originX:'center'}));
    canvas.add(new fabric.Textbox(t.t3[0], {left:540, top:t.t3[3], width:1000, fontSize:t.t3[1], fill:t.t3[2], fontFamily:'Arial Black', textAlign:'center', originX:'center'}));
    canvas.requestRenderAll(); // FORCE DRAW
    document.querySelector('.canvas-wrap').scrollIntoView({behavior: 'smooth'});
  });
}
</script>

</body>
</html>
