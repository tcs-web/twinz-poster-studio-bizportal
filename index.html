<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twins Poster Studio AI PRO - TAIL EDITION</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: 'Arial Black', Arial; background: #0a0a0a; color: white; margin:0; }
  header { background: linear-gradient(90deg, #ff4d00, #a855f7, #00d4ff); padding: 12px; text-align: center; font-size: 16px; font-weight: bold; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #111; justify-content: center; position: sticky; top:0; z-index:50; }
  button { padding: 10px 12px; border: none; background: #ff4d00; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 11px; }
.ai-btn { background: linear-gradient(90deg, #a855f7, #00d4ff); }
.shape-btn { background: #7c3aed; }
.danger-btn { background: #ff0000; }
.brand-colors { display: flex; gap: 8px; justify-content: center; padding: 10px; background: #111; }
.color { width: 35px; height: 35px; border-radius: 50%; border: 3px solid white; cursor: pointer; }
.color.active { border: 3px solid #00d4ff; }
.side-panel { display: flex; }
.layers { width: 120px; background: #1a1a1a; padding: 8px; max-height: 400px; overflow-y: auto; font-size: 10px; }
.layer-item { background: #2a2a2a; padding: 6px; margin: 3px 0; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; }
.layer-item.active { background: #00d4ff; color: #000; }
.layer-item button { padding: 2px 6px; font-size: 10px; background: #ff0000; border:none; color:white; }
.templates-section { background: #1a1a1a; padding: 15px; }
.templates-title { text-align: center; font-size: 16px; margin-bottom: 12px; color: #00d4ff; font-weight: bold; }
.templates-wrapper { max-height: 280px; overflow-y: auto; }
.templates { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.template-btn { background: #2a2a2a; border: 2px solid #00d4ff; padding: 14px 8px; text-align: center; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; width: 100%; }
.canvas-wrap { display: flex; justify-content: center; padding: 15px; flex: 1; }
  canvas { background: white; max-width: 100%; border: 3px solid #00d4ff; touch-action: none; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
.modal-content { background: #222; padding: 20px; border-radius: 10px; text-align: center; width: 90%; }
input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
</style>
</head>
<body>

<header>🔥 TWINS POSTER STUDIO AI PRO - TAIL EDITION</header>

<div class="toolbar">
  <button onclick="undo()">↩️ Undo</button>
  <button onclick="redo()">↪️ Redo</button>
  <button onclick="addText()">T Text</button>
  <button onclick="uploadImage()">🖼️ Image</button>
  <button class="shape-btn" onclick="addShape('curve')">~ Curve</button>
  <button class="shape-btn" onclick="addShape('circle')">○ Circle</button>
  <button class="shape-btn" onclick="addShape('tail')">▶ Tail</button>
  <button class="shape-btn" onclick="addShape('ribbon')">🏷️ Ribbon</button>
  <button onclick="duplicateLayer()">📋 Dup</button>
  <button onclick="bringForward()">⬆️ Front</button>
  <button onclick="sendBack()">⬇️ Back</button>
  <button onclick="exportPNG()">HD PNG</button>
  <button class="danger-btn" onclick="clearCanvas()">Clear</button>
</div>

<div class="brand-colors">
  <div class="color active" style="background:#ff4d00" onclick="setBrand('#ff4d00', this)"></div>
  <div class="color" style="background:#00d4ff" onclick="setBrand('#00d4ff', this)"></div>
  <div class="color" style="background:#a855f7" onclick="setBrand('#a855f7', this)"></div>
  <div class="color" style="background:#ffff00" onclick="setBrand('#ffff00', this)"></div>
  <div class="color" style="background:#000" onclick="setBrand('#000', this)"></div>
  <div class="color" style="background:#fff" onclick="setBrand('#fff', this)"></div>
</div>

<div class="side-panel">
  <div class="layers" id="layers">
    <b style="color:#00d4ff">LAYERS - TAP TO DRAG</b>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1080" height="1350"></canvas>
  </div>
</div>

<div class="templates-section">
  <div class="templates-title">📋 30 PREMIUM THEMES</div>
  <div class="templates-wrapper">
    <div class="templates">
      <button class="template-btn" onclick="loadTemplate(0)">Corporate Pro</button>
      <button class="template-btn" onclick="loadTemplate(20)">Best Marketing</button>
      <button class="template-btn" onclick="loadTemplate(22)">Business Idea</button>
      <button class="template-btn" onclick="loadTemplate(25)">Fashion Sale</button>
    </div>
  </div>
</div>

<div class="modal" id="textModal">
  <div class="modal-content">
    <h3 id="textModalTitle">Add/Edit Text</h3>
    <input type="text" id="textInput" placeholder="Type your text here">
    <button onclick="confirmText()">Save</button>
    <button onclick="closeText()">Cancel</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let brandColor = '#ff4d00';
let history = [];
let historyStep = -1;
let elements = [];
let selectedIndex = -1;
let isDragging = false;

const templates = [
  {bg:'#0a0a0a', t1:['YOUR BUSINESS',90,'#ff4d00',200], t2:['Professional Services',50,'#fff',350], t3:['Call: 012 345 6789',45,'#fff',1100]},
  {bg:'#1e3a8a', t1:['FOR SALE',110,'#fff',180], t2:['3 Bedroom House',55,'#fbbf24',320], t3:['Contact Agent',45,'#fff',500]},
  {bg:'#ff0000', t1:['MEGA SALE!',130,'#ffff00',150], t2:['UP TO 70% OFF',75,'#fff',300], t3:['This Weekend',50,'#fff',450]},
  {bg:'#000', t1:['BLACK FRIDAY',110,'#ff4d00',180], t2:['BIGGEST DEALS',60,'#fff',320], t3:['Don\'t Miss!',50,'#fff',450]},
  {bg:'#1e3a8a', t1:['SUNDAY SERVICE',80,'#fff',200], t2:['10:00 AM',50,'#fbbf24',340], t3:['All Welcome',45,'#fff',480]},
  {bg:'#7c3aed', t1:['HE IS RISEN',100,'#fff',200], t2:['Easter Service',55,'#fbbf24',340], t3:['Join Us',45,'#fff',480]},
  {bg:'#ff9500', t1:['GRAND OPENING',90,'#fff',200], t2:['You Are Invited',55,'#000',340], t3:['Free Gifts',45,'#fff',480]},
  {bg:'#7c3aed', t1:['LIVE CONCERT',100,'#fff',180], t2:['Top Artists',50,'#fbbf24',320], t3:['Get Tickets',45,'#fff',460]},
  {bg:'#dc2626', t1:['TODAY SPECIAL',90,'#fff',200], t2:['Burger + Chips',55,'#fbbf24',340], t3:['Only R99',65,'#fff',480]},
  {bg:'#111827', t1:['OUR MENU',100,'#ff4d00',180], t2:['Pizza | Pasta',50,'#fff',320], t3:['Order Now',45,'#fff',460]},
  {bg:'#059669', t1:['2026 ENROLLMENT',90,'#fff',200], t2:['Now Open',65,'#fbbf24',340], t3:['Visit Us',45,'#fff',480]},
  {bg:'#2563eb', t1:['FREE HEALTH CHECK',80,'#fff',200], t2:['BP + Sugar Test',50,'#fbbf24',340], t3:['This Saturday',45,'#fff',480]},
  {bg:'#fbbf24', t1:['YOU ARE INVITED',80,'#000',200], t2:['John & Sarah',55,'#7c3aed',340], t3:['12 Dec 2026',45,'#000',480]},
  {bg:'#ec4899', t1:['BIRTHDAY PARTY',90,'#fff',200], t2:['You\'re Invited!',55,'#fbbf24',340], t3:['Let\'s Celebrate',45,'#fff',480]},
  {bg:'#0a0a0a', t1:['WE ARE HIRING',100,'#ff4d00',200], t2:['Sales Assistant',50,'#fff',340], t3:['Apply Today',45,'#fff',480]},
  {bg:'#111827', t1:['JOIN THE GYM',100,'#ff4d00',200], t2:['First Month Free',55,'#fff',340], t3:['Get Fit',45,'#fff',480]},
  {bg:'#2563eb', t1:['CAR WASH',90,'#fff',200], t2:['Full Wash',55,'#fbbf24',340], t3:['Only R80',65,'#fff',480]},
  {bg:'#ec4899', t1:['HAIR SPECIAL',100,'#fff',200], t2:['Cut + Wash',55,'#fbbf24',340], t3:['Book Now',45,'#fff',480]},
  {bg:'#ff9500', t1:['SPAZA SPECIALS',90,'#000',200], t2:['Bread R15',50,'#000',340], t3:['Open 24hrs',45,'#000',480]},
  {bg:'#111827', t1:['IN LOVING MEMORY',80,'#fff',200], t2:['Celebration of Life',55,'#fbbf24',340], t3:['All Welcome',45,'#fff',480]},
  {bg:'#ff6a00', t1:['BEST',70,'#fff',180], t2:['MARKETING',70,'#00d4ff',270], t3:['AGENCY',70,'#fff',360]},
  {bg:'#4c1d95', t1:['MODERN',80,'#fff',200], t2:['TEMPLATE',80,'#a855f7',300], t3:['CORPORATE',50,'#fff',400]},
  {bg:'#0ea5e9', t1:['NEXT LEVEL',60,'#fff',200], t2:['BUSINESS',70,'#ffff00',290], t3:['IDEA',60,'#fff',380]},
  {bg:'#fff', t1:['ANNUAL',80,'#ff6a00',200], t2:['REPORT',80,'#000',300], t3:['2026',60,'#ff6a00',400]},
  {bg:'#fff', t1:['CREATIVE',60,'#ff6a00',200], t2:['COVER',60,'#000',280], t3:['DESIGN',60,'#ff6a00',360]},
  {bg:'#be185d', t1:['FASHION',80,'#fff',200], t2:['SALE',100,'#ffff00',320], t3:['UP TO 35% OFF',45,'#fff',420]},
  {bg:'#1e40af', t1:['SUPPORT',80,'#fff',200], t2:['SERVICES',60,'#60a5fa',300], t3:['24/7 HELP',50,'#fff',400]},
  {bg:'#581c87', t1:['MANAGEMENT',70,'#fff',200], t2:['PRO',80,'#c084fc',300], t3:['LEADERSHIP',50,'#fff',400]},
  {bg:'#2563eb', t1:['10% OFF',90,'#ffff00',200], t2:['BUSINESS',70,'#fff',320], t3:['SPECIAL DEAL',45,'#fff',420]},
  {bg:'#0f172a', t1:['AGENCY',90,'#00d4ff',200], t2:['PRO',90,'#fff',320], t3:['MARKETING SOLUTIONS',40,'#00d4ff',420]},
];

function saveState() {
  history = history.slice(0, historyStep + 1);
  history.push(JSON.stringify(elements));
  historyStep++;
  updateLayers();
}

function undo() {
  if(historyStep > 0) {
    historyStep--;
    elements = JSON.parse(history[historyStep]);
    redraw();
  }
}

function redo() {
  if(historyStep < history.length - 1) {
    historyStep++;
    elements = JSON.parse(history[historyStep]);
    redraw();
  }
}

function setBrand(color, el) {
  brandColor = color;
  document.querySelectorAll('.color').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if(selectedIndex >= 0) {
    elements[selectedIndex].color = color;
    saveState();
    redraw();
  }
}

function updateLayers() {
  const layersDiv = document.getElementById('layers');
  layersDiv.innerHTML = '<b style="color:#00d4ff">LAYERS - TAP TO DRAG</b>';
  elements.forEach((el, i) => {
    if(el.type === 'bg') return;
    const name = el.type === 'text'? el.text.substring(0,8) : el.type;
    layersDiv.innerHTML += `
      <div class="layer-item ${i===selectedIndex?'active':''}" onclick="selectLayer(${i})">
        <span>${el.type} ${i+1}: ${name}</span>
        <button onclick="deleteLayer(${i});event.stopPropagation()">X</button>
      </div>
    `;
  });
}

function selectLayer(i) {
  selectedIndex = i;
  updateLayers();
  if(elements[i].type === 'text') {
    document.getElementById('textModalTitle').innerText = 'Edit Text';
    document.getElementById('textInput').value = elements[i].text;
    document.getElementById('textModal').style.display = 'flex';
  }
}

function deleteLayer(i) {
  elements.splice(i, 1);
  selectedIndex = -1;
  saveState();
  redraw();
}

function duplicateLayer() {
  if(selectedIndex >= 0) {
    const dup = JSON.parse(JSON.stringify(elements[selectedIndex]));
    dup.y += 30; dup.x += 30;
    elements.push(dup);
    selectedIndex = elements.length - 1;
    saveState();
    redraw();
  }
}

function bringForward() {
  if(selectedIndex >= 0 && selectedIndex < elements.length - 1) {
    [elements[selectedIndex], elements[selectedIndex+1]] = [elements[selectedIndex+1], elements[selectedIndex]];
    selectedIndex++;
    saveState();
    redraw();
  }
}

function sendBack() {
  if(selectedIndex > 0) {
    [elements[selectedIndex], elements[selectedIndex-1]] = [elements[selectedIndex-1], elements[selectedIndex]];
    selectedIndex--;
    saveState();
    redraw();
  }
}

function addShape(type) {
  if(type === 'curve') {
    elements.push({type:'shape', shape:'curve', x:0, y:800, w:1080, h:400, color:brandColor});
  }
  if(type === 'circle') {
    elements.push({type:'shape', shape:'circle', x:540, y:300, r:150, color:brandColor});
  }
  if(type === 'tail') {
    elements.push({type:'shape', shape:'tail', x:100, y:500, w:400, h:150, color:brandColor});
  }
  if(type === 'ribbon') {
    elements.push({type:'shape', shape:'ribbon', x:50, y:100, w:300, h:80, color:brandColor});
  }
  selectedIndex = elements.length - 1;
  saveState();
  redraw();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if(elements.length > 0 && elements[0].type === 'bg') {
    ctx.fillStyle = elements[0].color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  
  elements.forEach((el, i) => {
    if(el.type === 'bg') return;
    
    if(el.type === 'text') {
      ctx.fillStyle = el.color;
      ctx.font = `bold ${el.size}px Arial Black`;
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = i===selectedIndex?20:10;
      ctx.fillText(el.text, el.x, el.y);
      ctx.shadowBlur = 0;
    }
    
    if(el.type === 'shape') {
      ctx.fillStyle = el.color;
      if(el.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(el.x, el.y, el.r, 0, Math.PI*2);
        ctx.fill();
      }
      if(el.shape === 'curve') {
        ctx.beginPath();
        ctx.moveTo(el.x, el.y + el.h);
        ctx.quadraticCurveTo(el.x + el.w/2, el.y, el.x + el.w, el.y + el.h);
        ctx.lineTo(el.x + el.w, canvas.height);
        ctx.lineTo(el.x, canvas.height);
        ctx.closePath();
        ctx.fill();
      }
      if(el.shape === 'tail') {
        // Speech bubble tail
        ctx.beginPath();
        ctx.roundRect(el.x, el.y, el.w, el.h, 20);
        ctx.lineTo(el.x + el.w/2 - 20, el.y + el.h);
        ctx.lineTo(el.x + el.w/2, el.y + el.h + 40);
        ctx.lineTo(el.x + el.w/2 + 20, el.y + el.h);
        ctx.closePath();
        ctx.fill();
      }
      if(el.shape === 'ribbon') {
        // Sale ribbon with tail
        ctx.beginPath();
        ctx.moveTo(el.x, el.y);
        ctx.lineTo(el.x + el.w, el.y);
        ctx.lineTo(el.x + el.w + 30, el.y + el.h/2);
        ctx.lineTo(el.x + el.w, el.y + el.h);
        ctx.lineTo(el.x, el.y + el.h);
        ctx.lineTo(el.x + 30, el.y + el.h/2);
        ctx.closePath();
        ctx.fill();
      }
    }
  });
}

// DRAG TO MOVE
canvas.addEventListener('touchstart', handleStart);
canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('touchmove', handleMove);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('touchend', ()=>isDragging=false);
canvas.addEventListener('mouseup', ()=>isDragging=false);

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
  const y = (e.touches?e.touches[0].clientY:e.clientY) - rect.top;
  return {x: x * (canvas.width/rect.width), y: y * (canvas.height/rect.height)};
}

function handleStart(e) {
  const pos = getPos(e);
  for(let i=elements.length-1; i>=0; i--) {
    if(elements[i].type === 'bg') continue;
    const dist = Math.abs(pos.x - elements[i].x) + Math.abs(pos.y - elements[i].y);
    if(dist < 150) {
      selectedIndex = i;
      isDragging = true;
      updateLayers();
      return;
    }
  }
}

function handleMove(e) {
  if(!isDragging || selectedIndex < 0) return;
  const pos = getPos(e);
  elements[selectedIndex].x = pos.x;
  elements[selectedIndex].y = pos.y;
  redraw();
}

function addText() {
  document.getElementById('textModalTitle').innerText = 'Add Text';
  document.getElementById('textInput').value = '';
  document.getElementById('textModal').style.display = 'flex';
}

function confirmText() {
  const text = document.getElementById('textInput').value;
  if(text) {
    if(selectedIndex >= 0 && elements[selectedIndex].type === 'text') {
      elements[selectedIndex].text = text;
    } else {
      elements.push({type:'text', text:text, x:540, y:400, size:60, color:brandColor});
      selectedIndex = elements.length - 1;
    }
    saveState();
    redraw();
  }
  closeText();
}

function closeText() {
  document.getElementById('textModal').style.display = 'none';
  document.getElementById('textInput').value = '';
}

function uploadImage() { uploadFile(false); }

function uploadFile(isLogo) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.src = reader.result;
      img.onload = () => {
        let w = isLogo? 200 : 500;
        let h = img.height * (w / img.width);
        let x = isLogo? 50 : 540 - w/2;
        let y = isLogo? 50 : 600;
        elements.push({type:'image', src:reader.result, x:x, y:y, w:w, h:h});
        selectedIndex = elements.length - 1;
        saveState();
        redraw();
      }
    }
    reader.readAsDataURL(e.target.files[0]);
  }
  input.click();
}

function exportPNG() {
  const link = document.createElement('a');
  link.download = 'TAIL-poster.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function clearCanvas() {
  elements = [];
  selectedIndex = -1;
  saveState();
  redraw();
}

function loadTemplate(i) {
  const t = templates[i];
  elements = [
    {type:'bg', color:t.bg},
    {type:'text', text:t.t1[0], x:540, y:t.t1[3], size:t.t1[1], color:t.t1[2]},
    {type:'text', text:t.t2[0], x:540, y:t.t2[3], size:t.t2[1], color:t.t2[2]},
    {type:'text', text:t.t3[0], x:540, y:t.t3[3], size:t.t3[1], color:t.t3[2]},
  ];
  if(i >= 20) {
    elements.push({type:'shape', shape:'curve', x:0, y:900, w:1080, h:300, color:'#ffffff22'});
  }
  selectedIndex = -1;
  saveState();
  redraw();
  document.querySelector('.canvas-wrap').scrollIntoView({behavior: 'smooth'});
}

loadTemplate(0);
</script>

</html>
