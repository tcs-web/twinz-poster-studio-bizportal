<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twins Poster Studio AI PRO - WORLD CLASS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: 'Arial Black', Arial; background: #0a0a0a; color: white; margin:0; }
  header { background: linear-gradient(90deg, #ff4d00, #a855f7, #00d4ff); padding: 12px; text-align: center; font-size: 16px; font-weight: bold; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #111; justify-content: center; position: sticky; top:0; z-index:50; }
  button { padding: 10px 14px; border: none; background: #ff4d00; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 12px; }
.ai-btn { background: linear-gradient(90deg, #a855f7, #00d4ff); }
.pro-btn { background: #00d4ff; color: #000; }
.brand-colors { display: flex; gap: 8px; justify-content: center; padding: 10px; background: #111; }
.color { width: 35px; height: 35px; border-radius: 50%; border: 3px solid white; cursor: pointer; }
.color.active { border: 3px solid #00d4ff; }
.side-panel { display: flex; }
.layers { width: 110px; background: #1a1a1a; padding: 8px; max-height: 400px; overflow-y: auto; font-size: 10px; }
.layer-item { background: #2a2a2a; padding: 5px; margin: 3px 0; border-radius: 4px; font-size: 9px; }
.templates-section { background: #1a1a1a; padding: 15px; }
.templates-title { text-align: center; font-size: 16px; margin-bottom: 12px; color: #00d4ff; font-weight: bold; }
.templates-wrapper { max-height: 280px; overflow-y: auto; }
.templates { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.template-btn { background: #2a2a2a; border: 2px solid #00d4ff; padding: 14px 8px; text-align: center; border-radius: 8px; color: white; font-weight: bold; font-size: 13px; width: 100%; }
.template-btn:active { background: #00d4ff; color: #000; }
.canvas-wrap { display: flex; justify-content: center; padding: 15px; flex: 1; }
  canvas { background: white; max-width: 100%; border: 3px solid #00d4ff; touch-action: none; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
.modal-content { background: #222; padding: 20px; border-radius: 10px; text-align: center; width: 90%; }
input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
</style>
</head>
<body>

<header>🔥 TWINS POSTER STUDIO AI PRO - WORLD CLASS</header>

<div class="toolbar">
  <button onclick="undo()">↩️ Undo</button>
  <button onclick="redo()">↪️ Redo</button>
  <button onclick="addText()">T Text</button>
  <button onclick="uploadImage()">🖼️ Image</button>
  <button onclick="uploadLogo()">Logo</button>
  <button onclick="addQR()">QR</button>
  <button class="ai-btn" onclick="aiBackground()">AI BG</button>
  <button onclick="exportPNG()">HD PNG</button>
  <button onclick="exportPDF()">Print PDF</button>
  <button onclick="clearCanvas()">Clear</button>
</div>

<div class="brand-colors">
  <div class="color active" style="background:#ff4d00" onclick="setBrand('#ff4d00', this)"></div>
  <div class="color" style="background:#00d4ff" onclick="setBrand('#00d4ff', this)"></div>
  <div class="color" style="background:#a855f7" onclick="setBrand('#a855f7', this)"></div>
  <div class="color" style="background:#ffff00" onclick="setBrand('#ffff00', this)"></div>
  <div class="color" style="background:#000" onclick="setBrand('#000', this)"></div>
  <div class="color" style="background:#fff" onclick="setBrand('#fff', this)"></div>
</div>

<div class="side-panel">
  <div class="layers" id="layers">
    <b style="color:#00d4ff">LAYERS</b>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1080" height="1350"></canvas>
  </div>
</div>

<div class="templates-section">
  <div class="templates-title">📋 20 GOD TIER TEMPLATES - TAP TO LOAD</div>
  <div class="templates-wrapper">
    <div class="templates">
      <button class="template-btn" onclick="loadTemplate(0)">Corporate Pro</button>
      <button class="template-btn" onclick="loadTemplate(1)">Real Estate</button>
      <button class="template-btn" onclick="loadTemplate(2)">Mega Sale 70%</button>
      <button class="template-btn" onclick="loadTemplate(3)">Black Friday</button>
      <button class="template-btn" onclick="loadTemplate(4)">Sunday Service</button>
      <button class="template-btn" onclick="loadTemplate(5)">Easter Special</button>
      <button class="template-btn" onclick="loadTemplate(6)">Grand Opening</button>
      <button class="template-btn" onclick="loadTemplate(7)">Live Concert</button>
      <button class="template-btn" onclick="loadTemplate(8)">Food Special</button>
      <button class="template-btn" onclick="loadTemplate(9)">Menu Board</button>
      <button class="template-btn" onclick="loadTemplate(10)">School Enroll</button>
      <button class="template-btn" onclick="loadTemplate(11)">Health Check</button>
      <button class="template-btn" onclick="loadTemplate(12)">Wedding Invite</button>
      <button class="template-btn" onclick="loadTemplate(13)">Birthday Party</button>
      <button class="template-btn" onclick="loadTemplate(14)">We Are Hiring</button>
      <button class="template-btn" onclick="loadTemplate(15)">Fitness Promo</button>
      <button class="template-btn" onclick="loadTemplate(16)">Car Wash</button>
      <button class="template-btn" onclick="loadTemplate(17)">Hair Special</button>
      <button class="template-btn" onclick="loadTemplate(18)">Spaza Special</button>
      <button class="template-btn" onclick="loadTemplate(19)">Memorial</button>
    </div>
  </div>
</div>

<div class="modal" id="textModal">
  <div class="modal-content">
    <h3>Add Text</h3>
    <input type="text" id="textInput" placeholder="Type your text here">
    <button onclick="confirmText()">Add Text</button>
    <button onclick="closeText()">Cancel</button>
  </div>
</div>

<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>Enter QR Code Link</h3>
    <input type="text" id="qrInput" placeholder="https://yourlink.com">
    <button onclick="generateQR()">Generate QR</button>
    <button onclick="closeQR()">Cancel</button>
    <div id="qrcode" style="margin-top:15px; background:white; padding:10px; display:inline-block;"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let brandColor = '#ff4d00';
let history = [];
let historyStep = -1;
let elements = []; // This is our "layers"

const templates = [
  {bg:'#0a0a0a', t1:['YOUR BUSINESS',90,'#ff4d00',200], t2:['Professional Services',50,'#fff',350], t3:['Call: 012 345 6789',45,'#fff',1100]},
  {bg:'#1e3a8a', t1:['FOR SALE',110,'#fff',180], t2:['3 Bedroom House',55,'#fbbf24',320], t3:['Contact Agent',45,'#fff',500]},
  {bg:'#ff0000', t1:['MEGA SALE!',130,'#ffff00',150], t2:['UP TO 70% OFF',75,'#fff',300], t3:['This Weekend',50,'#fff',450]},
  {bg:'#000', t1:['BLACK FRIDAY',110,'#ff4d00',180], t2:['BIGGEST DEALS',60,'#fff',320], t3:['Don\'t Miss!',50,'#fff',450]},
  {bg:'#1e3a8a', t1:['SUNDAY SERVICE',80,'#fff',200], t2:['10:00 AM',50,'#fbbf24',340], t3:['All Welcome',45,'#fff',480]},
  {bg:'#7c3aed', t1:['HE IS RISEN',100,'#fff',200], t2:['Easter Service',55,'#fbbf24',340], t3:['Join Us',45,'#fff',480]},
  {bg:'#ff9500', t1:['GRAND OPENING',90,'#fff',200], t2:['You Are Invited',55,'#000',340], t3:['Free Gifts',45,'#fff',480]},
  {bg:'#7c3aed', t1:['LIVE CONCERT',100,'#fff',180], t2:['Top Artists',50,'#fbbf24',320], t3:['Get Tickets',45,'#fff',460]},
  {bg:'#dc2626', t1:['TODAY SPECIAL',90,'#fff',200], t2:['Burger + Chips',55,'#fbbf24',340], t3:['Only R99',65,'#fff',480]},
  {bg:'#111827', t1:['OUR MENU',100,'#ff4d00',180], t2:['Pizza | Pasta',50,'#fff',320], t3:['Order Now',45,'#fff',460]},
  {bg:'#059669', t1:['2026 ENROLLMENT',90,'#fff',200], t2:['Now Open',65,'#fbbf24',340], t3:['Visit Us',45,'#fff',480]},
  {bg:'#2563eb', t1:['FREE HEALTH CHECK',80,'#fff',200], t2:['BP + Sugar Test',50,'#fbbf24',340], t3:['This Saturday',45,'#fff',480]},
  {bg:'#fbbf24', t1:['YOU ARE INVITED',80,'#000',200], t2:['John & Sarah',55,'#7c3aed',340], t3:['12 Dec 2026',45,'#000',480]},
  {bg:'#ec4899', t1:['BIRTHDAY PARTY',90,'#fff',200], t2:['You\'re Invited!',55,'#fbbf24',340], t3:['Let\'s Celebrate',45,'#fff',480]},
  {bg:'#0a0a0a', t1:['WE ARE HIRING',100,'#ff4d00',200], t2:['Sales Assistant',50,'#fff',340], t3:['Apply Today',45,'#fff',480]},
  {bg:'#111827', t1:['JOIN THE GYM',100,'#ff4d00',200], t2:['First Month Free',55,'#fff',340], t3:['Get Fit',45,'#fff',480]},
  {bg:'#2563eb', t1:['CAR WASH',90,'#fff',200], t2:['Full Wash',55,'#fbbf24',340], t3:['Only R80',65,'#fff',480]},
  {bg:'#ec4899', t1:['HAIR SPECIAL',100,'#fff',200], t2:['Cut + Wash',55,'#fbbf24',340], t3:['Book Now',45,'#fff',480]},
  {bg:'#ff9500', t1:['SPAZA SPECIALS',90,'#000',200], t2:['Bread R15',50,'#000',340], t3:['Open 24hrs',45,'#000',480]},
  {bg:'#111827', t1:['IN LOVING MEMORY',80,'#fff',200], t2:['Celebration of Life',55,'#fbbf24',340], t3:['All Welcome',45,'#fff',480]},
];

function saveState() {
  history = history.slice(0, historyStep + 1);
  history.push(JSON.stringify(elements));
  historyStep++;
  updateLayers();
}

function undo() {
  if(historyStep > 0) {
    historyStep--;
    elements = JSON.parse(history[historyStep]);
    redraw();
  }
}

function redo() {
  if(historyStep < history.length - 1) {
    historyStep++;
    elements = JSON.parse(history[historyStep]);
    redraw();
  }
}

function setBrand(color, el) {
  brandColor = color;
  document.querySelectorAll('.color').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function updateLayers() {
  const layersDiv = document.getElementById('layers');
  layersDiv.innerHTML = '<b style="color:#00d4ff">LAYERS</b>';
  elements.forEach((el, i) => {
    layersDiv.innerHTML += `<div class="layer-item">${el.type} ${i+1}</div>`;
  });
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if(elements.length > 0 && elements[0].type === 'bg') {
    ctx.fillStyle = elements[0].color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  
  elements.forEach(el => {
    if(el.type === 'text') {
      ctx.fillStyle = el.color;
      ctx.font = `bold ${el.size}px Arial Black`;
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 10;
      ctx.fillText(el.text, el.x, el.y);
      ctx.shadowBlur = 0;
    }
    if(el.type === 'image') {
      const img = new Image();
      img.src = el.src;
      img.onload = () => ctx.drawImage(img, el.x, el.y, el.w, el.h);
    }
  });
}

function addText() {
  document.getElementById('textModal').style.display = 'flex';
}

function confirmText() {
  const text = document.getElementById('textInput').value;
  if(text) {
    elements.push({type:'text', text:text, x:540, y:400, size:60, color:brandColor});
    saveState();
    redraw();
  }
  closeText();
}

function closeText() {
  document.getElementById('textModal').style.display = 'none';
  document.getElementById('textInput').value = '';
}

function uploadImage() { uploadFile(false); }
function uploadLogo() { uploadFile(true); }

function uploadFile(isLogo) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.src = reader.result;
      img.onload = () => {
        let w = isLogo? 200 : 500;
        let h = img.height * (w / img.width);
        let x = isLogo? 50 : 540 - w/2;
        let y = isLogo? 50 : 600;
        elements.push({type:'image', src:reader.result, x:x, y:y, w:w, h:h});
        saveState();
        redraw();
      }
    }
    reader.readAsDataURL(e.target.files[0]);
  }
  input.click();
}

function aiBackground() {
  const colors = ['#ff4d00','#a855f7','#1e3a8a','#059669','#ff0000'];
  const bg = colors[Math.floor(Math.random()*5)];
  elements = elements.filter(el => el.type!== 'bg');
  elements.unshift({type:'bg', color:bg});
  saveState();
  redraw();
}

function addQR() { document.getElementById('qrModal').style.display = 'flex'; }

function generateQR() {
  const url = document.getElementById('qrInput').value;
  if(!url) return alert('Enter link');
  document.getElementById('qrcode').innerHTML = '';
  new QRCode(document.getElementById('qrcode'), {text: url, width: 200, height: 200});
  setTimeout(() => {
    const src = document.getElementById('qrcode').querySelector('img').src;
    elements.push({type:'image', src:src, x:415, y:550, w:250, h:250});
    saveState();
    redraw();
    closeQR();
  }, 500);
}

function closeQR() { document.getElementById('qrModal').style.display = 'none'; }

function exportPNG() {
  const link = document.createElement('a');
  link.download = 'WORLD-CLASS-poster.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function exportPDF() {
  const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
  pdf.save('WORLD-CLASS-poster.pdf');
}

function clearCanvas() {
  elements = [];
  saveState();
  redraw();
}

function loadTemplate(i) {
  const t = templates[i];
  elements = [
    {type:'bg', color:t.bg},
    {type:'text', text:t.t1[0], x:540, y:t.t1[3], size:t.t1[1], color:t.t1[2]},
    {type:'text', text:t.t2[0], x:540, y:t.t2[3], size:t.t2[1], color:t.t2[2]},
    {type:'text', text:t.t3[0], x:540, y:t.t3[3], size:t.t3[1], color:t.t3[2]},
  ];
  saveState();
  redraw();
  document.querySelector('.canvas-wrap').scrollIntoView({behavior: 'smooth'});
}

// AUTO LOAD FIRST TEMPLATE
loadTemplate(0);
</script>

</body>
</html>
